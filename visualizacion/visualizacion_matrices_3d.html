<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz 3D - Ocupación de Horarios - ITIID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            overflow: hidden;
            color: #fff;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info-panel {
            position: absolute;
            top: 120px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            min-width: 280px;
            max-width: 350px;
        }

        .info-panel h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .info-item {
            margin-bottom: 12px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .info-label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd700;
        }

        .legend {
            position: absolute;
            top: 120px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            max-width: 280px;
        }

        .legend h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .legend-cube {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .legend-cube.free {
            background: rgba(100, 100, 100, 0.3);
        }

        .legend-cube.occupied {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .legend-cube.current {
            background: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 150px;
        }

        .layer-indicator {
            position: absolute;
            bottom: 120px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            min-width: 200px;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="canvas-container"></div>

        <div class="ui-overlay">
            <div class="header">
                <h1>Matriz 3D - Ocupación de Horarios</h1>
                <p class="subtitle">Cuatrimestre 1 - ITIID</p>
            </div>

            <div class="legend">
                <h3>Leyenda</h3>
                <div class="legend-item">
                    <div class="legend-cube free"></div>
                    <span>Libre</span>
                </div>
                <div class="legend-item">
                    <div class="legend-cube occupied"></div>
                    <span>Ocupado</span>
                </div>
                <div class="legend-item">
                    <div class="legend-cube current"></div>
                    <span>Asignando</span>
                </div>
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2);">
                    <div style="font-size: 0.85rem; opacity: 0.9;">
                        <strong>Carrera:</strong> ITIID<br>
                        <strong>Cuatrimestre:</strong> 1<br><br>
                        <strong>Dimensiones:</strong><br>
                        X: Días de la semana<br>
                        Y: Horas (7:00-14:00)<br>
                        Z: Maestros
                    </div>
                </div>
            </div>

            <div class="layer-indicator" id="layerIndicator">
                <div style="font-size: 1rem; opacity: 0.8; margin-bottom: 5px;">Capa Actual</div>
                <div id="currentLayer">Dr. Juan</div>
            </div>

            <div class="info-panel">
                <h3>Información</h3>
                <div class="info-item">
                    <div class="info-label">Paso Actual</div>
                    <div class="info-value" id="stepNumber">0 / 12</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Asignación Actual</div>
                    <div class="info-value" id="currentAssignment">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Ocupación Total</div>
                    <div class="info-value" id="occupancyRate">0%</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Rotación</div>
                    <div class="info-value">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="autoRotate" checked
                                style="width: 20px; height: 20px; cursor: pointer;">
                            <span style="font-size: 0.9rem;">Auto</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="controls-panel">
                <button id="startBtn">Iniciar</button>
                <button id="pauseBtn">Pausar</button>
                <button id="nextBtn">Siguiente</button>
                <button id="resetBtn">Reiniciar</button>
                <div class="speed-control">
                    <label>Velocidad:</label>
                    <input type="range" id="speedControl" min="100" max="2000" value="1000" step="100">
                    <span id="speedLabel">1x</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración
        const DAYS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
        const MAESTROS = ['Dr. Juan', 'Dra. Ana', 'Ing. Carlos', 'Lic. María'];
        const GRUPOS = ['ITIID 1-1', 'ITIID 1-2', 'ITIID 2-1'];

        // Datos de simulación
        const asignaciones = [
            { maestro: 0, materia: 'Matemáticas', grupo: 0, dia: 0, horaInicio: 0, horaFin: 2 },
            { maestro: 1, materia: 'Programación', grupo: 0, dia: 0, horaInicio: 2, horaFin: 3 },
            { maestro: 2, materia: 'Inglés', grupo: 1, dia: 0, horaInicio: 0, horaFin: 1 },
            { maestro: 0, materia: 'Matemáticas', grupo: 0, dia: 1, horaInicio: 0, horaFin: 1 },
            { maestro: 3, materia: 'Física', grupo: 2, dia: 1, horaInicio: 1, horaFin: 3 },
            { maestro: 1, materia: 'Programación', grupo: 1, dia: 1, horaInicio: 3, horaFin: 5 },
            { maestro: 2, materia: 'Bases de Datos', grupo: 0, dia: 2, horaInicio: 1, horaFin: 3 },
            { maestro: 0, materia: 'Matemáticas', grupo: 1, dia: 2, horaInicio: 3, horaFin: 4 },
            { maestro: 3, materia: 'Física', grupo: 0, dia: 3, horaInicio: 0, horaFin: 2 },
            { maestro: 1, materia: 'Programación', grupo: 2, dia: 3, horaInicio: 2, horaFin: 4 },
            { maestro: 2, materia: 'Inglés', grupo: 0, dia: 4, horaInicio: 0, horaFin: 1 },
            { maestro: 0, materia: 'Matemáticas', grupo: 2, dia: 4, horaInicio: 1, horaFin: 3 },
        ];

        // Variables globales
        let scene, camera, renderer, controls;
        let cubes = [];
        let ocupacionMaestros = {};
        let currentStep = 0;
        let isPlaying = false;
        let playInterval = null;
        let speed = 1000;
        let currentLayer = 0;

        // Inicializar Three.js
        function init() {
            const container = document.getElementById('canvas-container');

            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 10, 50);

            // Cámara
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(15, 12, 15);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Controles
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xffd700, 0.5);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);

            // Crear matriz 3D
            createMatrix();

            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.getElementById('autoRotate').addEventListener('change', (e) => {
                controls.autoRotate = e.target.checked;
            });

            // Animar
            animate();
        }

        // Crear la matriz 3D de cubos
        function createMatrix() {
            const cubeSize = 0.8;
            const spacing = 1.2;
            const offsetX = -(DAYS.length * spacing) / 2;
            const offsetY = -(7 * spacing) / 2;
            const offsetZ = -(MAESTROS.length * spacing) / 2;

            // Inicializar matriz de ocupación
            for (let d = 0; d < 5; d++) {
                ocupacionMaestros[d] = {};
                cubes[d] = [];
                for (let h = 0; h < 7; h++) {
                    ocupacionMaestros[d][h] = {};
                    cubes[d][h] = [];
                    for (let m = 0; m < MAESTROS.length; m++) {
                        ocupacionMaestros[d][h][m] = 0;

                        // Crear cubo
                        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
                        const material = new THREE.MeshPhongMaterial({
                            color: 0x404040,
                            transparent: true,
                            opacity: 0.3,
                            emissive: 0x202020
                        });
                        const cube = new THREE.Mesh(geometry, material);

                        cube.position.x = offsetX + d * spacing;
                        cube.position.y = offsetY + h * spacing;
                        cube.position.z = offsetZ + m * spacing;

                        cube.userData = { dia: d, hora: h, maestro: m, occupied: false };

                        // Borde
                        const edges = new THREE.EdgesGeometry(geometry);
                        const line = new THREE.LineSegments(
                            edges,
                            new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.5 })
                        );
                        cube.add(line);

                        scene.add(cube);
                        cubes[d][h][m] = cube;
                    }
                }
            }

            // Agregar ejes y etiquetas 3D
            createAxesAndLabels();
        }

        // Crear ejes de referencia y etiquetas 3D
        function createAxesAndLabels() {
            const axisLength = 10;
            const spacing = 1.2;
            const offsetX = -(DAYS.length * spacing) / 2;
            const offsetY = -(7 * spacing) / 2;
            const offsetZ = -(MAESTROS.length * spacing) / 2;

            // Eje X (Días) - Rojo
            const xAxis = new THREE.ArrowHelper(
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-5, -5, -3),
                axisLength,
                0xff0000
            );
            scene.add(xAxis);

            // Eje Y (Horas) - Verde
            const yAxis = new THREE.ArrowHelper(
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(-5, -5, -3),
                axisLength,
                0x00ff00
            );
            scene.add(yAxis);

            // Eje Z (Maestros) - Azul
            const zAxis = new THREE.ArrowHelper(
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(-5, -5, -3),
                axisLength,
                0x0000ff
            );
            scene.add(zAxis);

            // Etiquetas de días (Eje X)
            DAYS.forEach((day, i) => {
                const label = createTextSprite(day, '#ff6666');
                label.position.set(offsetX + i * spacing, offsetY - 1, offsetZ - 1);
                scene.add(label);
            });

            // Etiquetas de horas (Eje Y)
            for (let h = 0; h < 7; h++) {
                const hora = 7 + h;
                const label = createTextSprite(`${hora}:00`, '#66ff66');
                label.position.set(offsetX - 1.5, offsetY + h * spacing, offsetZ - 1);
                scene.add(label);
            }

            // Etiquetas de maestros (Eje Z)
            MAESTROS.forEach((maestro, i) => {
                const label = createTextSprite(maestro, '#6666ff');
                label.position.set(offsetX - 1.5, offsetY - 1, offsetZ + i * spacing);
                scene.add(label);
            });

            // Etiqueta de cuatrimestre
            const cuatrimestreLabel = createTextSprite('Cuatrimestre 1 - ITIID', '#ffd700', 32);
            cuatrimestreLabel.position.set(0, offsetY + 9, 0);
            scene.add(cuatrimestreLabel);
        }

        // Crear sprite de texto
        function createTextSprite(text, color = '#ffffff', fontSize = 20) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 512;
            canvas.height = 128;

            context.fillStyle = 'rgba(0, 0, 0, 0.7)';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.font = `bold ${fontSize}px Arial`;
            context.fillStyle = color;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(2, 0.5, 1);

            return sprite;
        }

        // Actualizar cubo
        function updateCube(dia, hora, maestro, occupied, current = false) {
            const cube = cubes[dia][hora][maestro];
            if (!cube) return;

            if (current) {
                cube.material.color.setHex(0xffd700);
                cube.material.opacity = 1.0;
                cube.material.emissive.setHex(0xffaa00);
                cube.scale.set(1.2, 1.2, 1.2);
            } else if (occupied) {
                cube.material.color.setHex(0xf5576c);
                cube.material.opacity = 0.9;
                cube.material.emissive.setHex(0xf093fb);
                cube.scale.set(1.0, 1.0, 1.0);
                cube.userData.occupied = true;
            } else {
                cube.material.color.setHex(0x404040);
                cube.material.opacity = 0.3;
                cube.material.emissive.setHex(0x202020);
                cube.scale.set(1.0, 1.0, 1.0);
            }
        }

        // Ejecutar paso de simulación
        function executeStep() {
            if (currentStep >= asignaciones.length) {
                stopSimulation();
                return;
            }

            const asig = asignaciones[currentStep];

            // Marcar como ocupado
            for (let h = asig.horaInicio; h < asig.horaFin; h++) {
                ocupacionMaestros[asig.dia][h][asig.maestro] = 1;
                updateCube(asig.dia, h, asig.maestro, true, true);

                // Después de un momento, quitar el highlight
                setTimeout(() => {
                    updateCube(asig.dia, h, asig.maestro, true, false);
                }, 500);
            }

            // Cambiar a la capa del maestro actual
            currentLayer = asig.maestro;
            updateLayerIndicator();

            // Actualizar UI
            updateInfo(asig);
            currentStep++;
        }

        // Actualizar información
        function updateInfo(asig) {
            document.getElementById('stepNumber').textContent = `${currentStep + 1} / ${asignaciones.length}`;
            document.getElementById('currentAssignment').textContent =
                `${asig.materia} - ${MAESTROS[asig.maestro]}`;

            // Calcular ocupación
            let total = 0, occupied = 0;
            for (let d = 0; d < 5; d++) {
                for (let h = 0; h < 7; h++) {
                    for (let m = 0; m < MAESTROS.length; m++) {
                        total++;
                        if (ocupacionMaestros[d][h][m] === 1) occupied++;
                    }
                }
            }
            const rate = ((occupied / total) * 100).toFixed(1);
            document.getElementById('occupancyRate').textContent = rate + '%';
        }

        // Actualizar indicador de capa
        function updateLayerIndicator() {
            document.getElementById('currentLayer').textContent = MAESTROS[currentLayer];
        }

        // Control de simulación
        function startSimulation() {
            if (currentStep >= asignaciones.length) {
                resetSimulation();
            }
            isPlaying = true;
            playInterval = setInterval(executeStep, speed);
        }

        function stopSimulation() {
            isPlaying = false;
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function resetSimulation() {
            stopSimulation();
            currentStep = 0;

            // Limpiar matriz
            for (let d = 0; d < 5; d++) {
                for (let h = 0; h < 7; h++) {
                    for (let m = 0; m < MAESTROS.length; m++) {
                        ocupacionMaestros[d][h][m] = 0;
                        updateCube(d, h, m, false);
                    }
                }
            }

            document.getElementById('stepNumber').textContent = '0 / 12';
            document.getElementById('currentAssignment').textContent = '-';
            document.getElementById('occupancyRate').textContent = '0%';
        }

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startSimulation);
        document.getElementById('pauseBtn').addEventListener('click', stopSimulation);
        document.getElementById('nextBtn').addEventListener('click', executeStep);
        document.getElementById('resetBtn').addEventListener('click', resetSimulation);

        document.getElementById('speedControl').addEventListener('click', (e) => {
            speed = 2100 - parseInt(e.target.value);
            const speedMultiplier = (2000 / speed).toFixed(1);
            document.getElementById('speedLabel').textContent = speedMultiplier + 'x';
            if (isPlaying) {
                stopSimulation();
                startSimulation();
            }
        });

        // Iniciar
        init();
    </script>
</body>

</html>
